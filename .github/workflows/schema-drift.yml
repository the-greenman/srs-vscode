name: Schema Drift

on:
  push:
  pull_request:

jobs:
  check-schema-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout srs-vscode
        uses: actions/checkout@v4
        with:
          path: srs-vscode

      - name: Checkout srs
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/srs
          path: srs

      - name: Run schema drift check
        working-directory: srs-vscode
        run: scripts/check-schema-drift.sh ../srs
